services:
  anvil:
    volumes:
      - ./app.py:/app/app.py
      - ./src:/app/src
      - ./templates:/app/templates
      - ./static:/app/static
    environment:
      - FLASK_APP=app.py
    command: flask run --host=0.0.0.0
    develop:
      watch:
        - path: ./app.py
          target: /app/app.py
          action: sync
        - path: ./src
          target: /app/src
          action: sync
        - path: ./templates
          target: /app/templates
          action: sync
        - path: ./static
          target: /app/static
          action: sync
