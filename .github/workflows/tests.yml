name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop build on syntax errors and undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Test with pytest
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Build Docker image
        run: |
          docker build -t anvil-forger:test .

      - name: Check image size
        run: |
          SIZE=$(docker images anvil-forger:test --format "{{.Size}}" | numfmt --from=iec)
          echo "Docker image size: $(docker images anvil-forger:test --format '{{.Size}}')"
          if [ $(echo "$SIZE > 1500000000" | bc) -eq 1 ]; then
            echo "Warning: Image size exceeds 1.5GB"
          fi

      - name: Run container health check
        run: |
          docker run -d --name anvil-test -p 5000:5000 anvil-forger:test
          sleep 10
          curl -f http://localhost:5000/ || exit 1
          docker logs anvil-test
          docker stop anvil-test
