# Anvil v2 Development Docker Compose
# SQLite database is persisted via bind-mounted ./data volume
services:
  anvil:
    image: anvil-v2:latest
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - ANVIL_SECRET_KEY=${ANVIL_SECRET_KEY:-change-me-in-development}
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
